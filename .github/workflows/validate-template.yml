name: Validate template

on:
  pull_request:
    branches:
      - main
    paths:
      - "plugins/**"
      - ".cursor-plugin/**"
      - "scripts/validate-template.mjs"
  push:
    branches:
      - main
    paths:
      - "plugins/**"
      - ".cursor-plugin/**"
      - "scripts/validate-template.mjs"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run template validator
        run: node scripts/validate-template.mjs
